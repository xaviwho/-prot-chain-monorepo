services:
  db:
    image: postgres:13
    container_name: protchain-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-protchain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  protchainapi:
    image: xaviwho/protchain:latest
    container_name: protchainapi
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-protchain}?sslmode=disable
      - ENVIRONMENT=production
      - PORT=8082
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - BIOAPI_URL=http://bioapi:8000
      - IPFS_ENDPOINT=http://ipfs:5001
      - BLOCKCHAIN_RPC=${BLOCKCHAIN_RPC:-https://purechainnode.com}
      - HTTP_READ_TIMEOUT_SEC=600
      - HTTP_WRITE_TIMEOUT_SEC=600
      - HTTP_IDLE_TIMEOUT_SEC=120
    ports:
      - "8082:8082"
    depends_on:
      - db
    restart: unless-stopped

  bioapi:
    image: xaviwho/bioapi:latest
    container_name: bioapi
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - UPLOAD_DIR=/app/uploads
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8082}

  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs
    ports:
      - "4001:4001"  # P2P port
      - "5001:5001"  # API port
      - "8080:8080"  # Gateway port
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_staging:/export
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped

  frontend:
    image: xaviwho/protchain-ui:latest
    container_name: protchain-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8082/api/v1}
    depends_on:
      - protchainapi
    restart: unless-stopped

volumes:
  postgres_data:
  ipfs_data:
  ipfs_staging:
